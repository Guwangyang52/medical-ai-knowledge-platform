  adaptation_rules:
    - 新任务必须先确认结局变量和任务类型
    - 如果用户数据是连续结局，应改用 MLPRegressor 或其他回归模型
    - 医学预测任务应额外报告混淆矩阵、敏感度、特异度或 AUC
    - 如果加入标准化步骤，必须避免数据泄漏
    - 如果使用 TensorFlow/Keras，应单独记录版本和运行环境
  do_not:
    - 不要提交原书 PDF、PPT 或配套代码全文

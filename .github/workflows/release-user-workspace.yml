name: Release user workspace

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}"
          }
          $version = $version.TrimStart("v")
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build user workspace zip
        shell: pwsh
        run: .\tools\build_user_workspace.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedicalAIKnowledgeWorkspace-v${{ steps.version.outputs.version }}
          path: dist/MedicalAIKnowledgeWorkspace-v${{ steps.version.outputs.version }}.zip

      - name: Attach zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MedicalAIKnowledgeWorkspace-v${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
